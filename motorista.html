<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Motorista | Águia Conecta</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f4f7f6; }
        .btn-panic { 
            height: 90px; font-size: 1.3rem; border-radius: 15px; 
            display: flex; align-items: center; justify-content: center; 
            gap: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: transform 0.1s;
        }
        .btn-panic:active { transform: scale(0.95); }
        .header-motorista {
            background-color: #003366; color: white; padding: 20px;
            border-radius: 0 0 20px 20px; margin-bottom: 25px; text-align: center;
        }
        #status-conexao {
            position: fixed; top: 10px; right: 10px; font-size: 12px;
            padding: 5px 10px; border-radius: 20px; z-index: 1000;
        }
        .online { background: #28a745; color: white; }
        .offline { background: #dc3545; color: white; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .bg-readonly { background-color: #e9ecef !important; opacity: 1; font-weight: bold; color: #003366; }
    </style>
</head>
<body class="pb-5">

    <div id="status-conexao" class="online fw-bold">🟢 ONLINE</div>

    <div class="header-motorista shadow">
        <h2 class="mb-0"><i class="fas fa-bus"></i> Suporte ao Motorista</h2>
        <div id="bemVindo" class="small mt-1">Carregando...</div>
    </div>

    <div class="container">
        <div class="card p-3 mb-4 shadow-sm border-0">
            <h5 class="text-muted mb-3"><i class="fas fa-bus-alt"></i> Veículo Designado</h5>
            <div id="avisoVinculo" class="alert alert-warning py-2 small d-none">Buscando veículo vinculado...</div>
            <div class="row">
                <div class="col-6">
                    <label class="form-label small fw-bold text-muted">PLACA</label>
                    <input type="text" id="placa" class="form-control form-control-lg bg-readonly text-center" readonly placeholder="---">
                </div>
                <div class="col-6">
                    <label class="form-label small fw-bold text-muted">Nº ÔNIBUS</label>
                    <input type="text" id="numero" class="form-control form-control-lg bg-readonly text-center" readonly placeholder="---">
                </div>
            </div>
        </div>

        <p class="fw-bold text-secondary text-uppercase small px-2">Selecione o problema ocorrido:</p>
        
        <div class="d-grid gap-3">
            <button onclick="enviarAlerta('Pneu Furado')" class="btn btn-warning btn-panic">
                <i class="fas fa-compact-disc fa-lg"></i> Pneu Furado
            </button>
            <button onclick="enviarAlerta('Superaquecimento')" class="btn btn-danger btn-panic">
                <i class="fas fa-thermometer-high fa-lg"></i> Aquecimento
            </button>
            <button onclick="enviarAlerta('Pane Mecânica')" class="btn btn-dark btn-panic">
                <i class="fas fa-tools fa-lg"></i> Pane Mecânica
            </button>
            <button onclick="enviarAlerta('Falta de Combustível')" class="btn btn-info text-white btn-panic" style="background-color: #00509d;">
                <i class="fas fa-gas-pump fa-lg"></i> Combustível
            </button>
        </div>

        <div class="text-center mt-4">
            <a href="index.html" onclick="localStorage.removeItem('usuarioLogado')" class="text-muted text-decoration-none small">
                <i class="fas fa-sign-out-alt"></i> Sair do Sistema
            </a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCse0N51grAeI3fHrFFP9Azo-hC9kIQ7qY",
            authDomain: "translog-231da.firebaseapp.com",
            projectId: "translog-231da",
            storageBucket: "translog-231da.firebasestorage.app",
            messagingSenderId: "306116251077",
            appId: "1:306116251077:web:cf9e590b7a14b5ff540fac",
            databaseURL: "https://translog-231da-default-rtdb.firebaseio.com/"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const usuario = JSON.parse(localStorage.getItem('usuarioLogado'));
        if(!usuario) window.location.href = 'index.html';
        document.getElementById('bemVindo').innerHTML = `Motorista: <b>${usuario.nome}</b>`;

        let ultimaPosicao = { lat: null, lng: null };

        // --- BUSCAR ÔNIBUS VINCULADO AO MOTORISTA ---
        function buscarVinculo() {
            const aviso = document.getElementById('avisoVinculo');
            aviso.classList.remove('d-none');

            db.ref('frota').on('value', snapshot => {
                let veiculoEncontrado = false;
                snapshot.forEach(child => {
                    const v = child.val();
                    if(v.motoristaMatricula === usuario.matricula) {
                        document.getElementById('placa').value = v.placa;
                        document.getElementById('numero').value = v.numero;
                        aviso.classList.add('d-none');
                        veiculoEncontrado = true;
                    }
                });

                if(!veiculoEncontrado) {
                    aviso.innerHTML = "⚠️ Nenhum ônibus vinculado à sua matrícula!";
                    aviso.className = "alert alert-danger py-2 small";
                }
            });
        }

        // GPS em tempo real
        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition(pos => {
                ultimaPosicao = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            }, err => console.error("Erro GPS:", err), { enableHighAccuracy: true });
        }

        // HEARTBEAT (Agora corrigido com a lógica de tempo real)
        function enviarSinalDeVida() {
            const numeroBus = document.getElementById('numero').value;
            const statusDiv = document.getElementById('status-conexao');

            if (navigator.onLine) {
                statusDiv.innerHTML = "🟢 ONLINE";
                statusDiv.className = "online fw-bold";
                
                if (numeroBus) {
                    db.ref('heartbeats/' + numeroBus).set({
                        timestamp: firebase.database.ServerValue.TIMESTAMP,
                        motoristaNome: usuario.nome,
                        matricula: usuario.matricula,
                        lat: ultimaPosicao.lat || null,
                        lng: ultimaPosicao.lng || null
                    });
                }
            } else {
                statusDiv.innerHTML = "🔴 SEM INTERNET";
                statusDiv.className = "offline fw-bold";
            }
        }

        function enviarAlerta(tipo) {
            const placa = document.getElementById('placa').value;
            const numero = document.getElementById('numero').value;

            if(!numero) {
                alert("🚨 Você não possui um ônibus vinculado!");
                return;
            }

            db.ref('chamados').push({
                placa,
                numero,
                problema: tipo,
                matricula: usuario.matricula,
                motorista: usuario.nome,
                hora: new Date().toLocaleTimeString('pt-BR'),
                lat: ultimaPosicao.lat || null,
                lng: ultimaPosicao.lng || null,
                status: '🚨 Pendente'
            }).then(() => alert("✅ ALERTA ENVIADO!"));
        }

        // Iniciar processos
        buscarVinculo();
        setInterval(enviarSinalDeVida, 10000); 
    </script>
</body>
</html>
