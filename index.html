<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Águia Conecta</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            background: linear-gradient(135deg, #003366 0%, #00509d 100%); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }
        .login-card { 
            width: 100%; 
            max-width: 400px; 
            padding: 40px 30px; 
            border-radius: 20px; 
            background: white; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); 
        }
        .logo-area {
            text-align: center;
            margin-bottom: 30px;
        }
        /* Ajuste para usar sua logo.png se desejar */
        .logo-img {
            width: 80px;
            height: auto;
            margin-bottom: 10px;
        }
        .btn-login {
            background-color: #003366;
            border: none;
            padding: 12px;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn-login:hover {
            background-color: #00509d;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo-area">
        <i class="fas fa-bus-alt" style="font-size: 3rem; color: #003366;"></i>
        <h3 class="mt-2 fw-bold" style="color: #003366;">Águia Conecta</h3>
        <p class="text-muted small">Gerenciamento de Contingência</p>
    </div>

    <div class="mb-3">
        <label class="form-label fw-bold"><i class="fas fa-id-card me-2"></i>Matrícula ou Acesso</label>
        <input type="text" id="usuario" class="form-control form-control-lg text-center" placeholder="Digite sua matrícula" autofocus>
    </div>
    
    <button onclick="fazerLogin()" id="btnEntrar" class="btn btn-primary btn-login w-100 mb-3">
        ENTRAR NO SISTEMA
    </button>

    <div class="text-center">
        <small class="text-muted">Acesso Administrativo: <b>central</b></small><br>
        <small class="text-muted">Motoristas: Use sua matrícula cadastrada</small>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>
    // Configuração do seu Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyCse0N51grAeI3fHrFFP9Azo-hC9kIQ7qY",
        authDomain: "translog-231da.firebaseapp.com",
        projectId: "translog-231da",
        storageBucket: "translog-231da.firebasestorage.app",
        messagingSenderId: "306116251077",
        appId: "1:306116251077:web:cf9e590b7a14b5ff540fac",
        databaseURL: "https://translog-231da-default-rtdb.firebaseio.com/"
    };

    // Inicializar Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    async function fazerLogin() {
        const input = document.getElementById('usuario').value.toLowerCase().trim();
        const btn = document.getElementById('btnEntrar');
        
        if(!input) return alert("Digite algo!");

        // 1. Acesso à Central (Local)
        if(input === 'central') {
            window.location.href = 'central.html';
            return;
        }

        // 2. Busca Motorista no Firebase
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Autenticando...';

        try {
            const snapshot = await db.ref('motoristas').once('value');
            let motoristaEncontrado = null;

            snapshot.forEach((childSnapshot) => {
                const m = childSnapshot.val();
                if(m.matricula === input) {
                    motoristaEncontrado = m;
                }
            });

            if(motoristaEncontrado) {
                // Salva na sessão local para o app saber quem é o motorista
                localStorage.setItem('usuarioLogado', JSON.stringify({
                    nome: motoristaEncontrado.nome,
                    matricula: motoristaEncontrado.matricula,
                    tipo: 'motorista'
                }));
                window.location.href = 'motorista.html';
            } else {
                alert('❌ Matrícula não cadastrada na Central!');
                btn.disabled = false;
                btn.innerText = 'ENTRAR NO SISTEMA';
            }
        } catch (error) {
            console.error(error);
            alert("Erro ao conectar com o banco de dados.");
            btn.disabled = false;
            btn.innerText = 'ENTRAR NO SISTEMA';
        }
    }
    
    document.getElementById('usuario').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') fazerLogin();
    });
</script>

</body>
</html>
